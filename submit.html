<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>submit</title>
        <style>
            body{
                background-color: beige;
            }
        </style>
    </head>
    <body>
        <h2>Select the cake:</h2>
        <form>
            <label>Select cake</label>
            <select name="cake">
                <option>Butter cake </option>
                <option>Sponge cake</option>
                <option>Chocolate cake</option>
                <option>Coffee cake</option>
                <option>Flourless cake </option>
                <option>Layer cakes</option>
                <option>One-egg cake</option>
            </select>
             <br>
              <br>
            <label>Weight</label>
            <select name="weight">
                <option>1kg</option>
                <option>1/2kg</option>
                <option>2kg</option>
            </select>
             <br>  <br>
             <hr>
             <h2>Details:</h2>
             <label>Name:</label>
              <br>  <br>
              <input type="text">
               <br> <br>
               <label>Email:</label>
                <br> <br>
            <input type="email">
             <br> <br>
            <label>Address:</label>
            <br>  <br>
            <input type="text">
             <br>  <br>
            <label>Phone number:</label>
             <br>  <br>
            <input type="number">
             <br>  <br>
            <label>Gift wrap:</label>
    
            <input type="checkbox">
             <br>  <br>
            <label>Mode of payment</label>
    
            <select name="payment">
                <option>cash</option>
                <option>upi</option>
                <option>card</option>
            </select>
             <br> <br>
             <label>Mode of delivery:</label>
              <br> <br>
              <input type="radio" value="normal" name="delivery">normal
              <input type="radio" value="express" name="delivery">express
               <br> <br>
               <hr>
               <h2>Feedback Form:</h2>
        <textarea name="feedback" id="101" placeholder="please give your feedback..." rows="10" column="10">Feedback</textarea>
         <br> <br>    
        <button>Submit</button>
            </form>
    </body>
</html>
